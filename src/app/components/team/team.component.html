<section class="team section-shell" id="team">
  <div class="section-heading">
    <p class="eyebrow">{{ content.team.eyebrow }}</p>
    <h2>{{ content.team.title }}</h2>
  </div>

  <div class="team-grid">
    <article class="team-profile team-profile-founder">
      <figure>
        <img src="content/founder/7bba4909-7c5f-453c-829b-4bb287222216.png" alt="Leonardo Diaz, Founder of Nev Research" />
      </figure>
      <div>
        <p class="eyebrow">{{ content.team.founderRole }}</p>
        <h3>{{ content.team.founderName }}</h3>
        <p>{{ content.team.founderBio }}</p>
      </div>
    </article>

    <article class="team-profile team-profile-engineer">
      <figure>
        <img src="content/engineers/34362f85-3e52-440c-a32b-f83dd5f8a5fa.png" alt="Data engineer at Nev Research" />
      </figure>
      <div>
        <p class="eyebrow">{{ content.team.engineerRole }}</p>
        <h3>{{ content.team.engineerName }}</h3>
        <p>{{ content.team.engineerBio }}</p>
      </div>
    </article>
  </div>
</section>
